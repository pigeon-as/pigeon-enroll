syntax = "proto3";
package pigeon.enroll.v1;
option go_package = "github.com/pigeon-as/pigeon-enroll/proto/enroll/v1;enrollv1";

// EnrollmentService provides secret enrollment via HMAC token authentication
// with optional TPM attestation.
//
// Follows the SPIRE AttestAgent bidirectional stream pattern:
// - TPM: params → challenge → challenge_response → result
// - Token-only: params → result
service EnrollmentService {
  rpc Claim(stream ClaimRequest) returns (stream ClaimResponse);
}

message ClaimRequest {
  oneof step {
    // Initial request with authentication and optional TPM data.
    ClaimParams params = 1;
    // Response to a TPM credential activation challenge.
    bytes challenge_response = 2;
  }
}

// ClaimParams is the initial message in a Claim stream.
message ClaimParams {
  string token = 1;
  string scope = 2;
  string subject = 3;
  // If absent, claim is token-only (no TPM attestation).
  TPMParams tpm = 4;
  // Optional CSR for cert blocks with mode = "csr".
  // DER-encoded PKCS#10 CertificateRequest.
  bytes csr_der = 5;
}

// TPMParams carries TPM attestation data (go-attestation AttestationParameters).
message TPMParams {
  // PKIX DER-encoded EK public key.
  bytes ek_public = 1;
  // DER-encoded X.509 EK certificate (optional, for CA chain validation).
  bytes ek_cert = 2;
  // AK canonical encoding (includes public key + signing parameters).
  bytes ak_public = 3;
  // TPMS_CREATION_DATA encoding.
  bytes ak_create_data = 4;
  // TPMS_ATTEST encoding.
  bytes ak_create_attestation = 5;
  // TPMT_SIGNATURE encoding.
  bytes ak_create_signature = 6;
}

// TPMChallenge is a credential activation challenge (go-attestation EncryptedCredential).
message TPMChallenge {
  bytes credential = 1;
  bytes secret = 2;
}

message ClaimResponse {
  oneof step {
    // Intermediate: TPM credential activation challenge.
    TPMChallenge challenge = 1;
    // Final: enrollment result with secrets.
    ClaimResult result = 2;
  }
}

message ClaimResult {
  map<string, string> secrets = 1;
  map<string, string> vars = 2;
  map<string, CACert> ca = 3;
  map<string, CertBundle> certs = 4;
  map<string, string> jwts = 5;
  map<string, string> jwt_keys = 6;
}

// CACert holds a CA certificate and optionally its private key (scope-gated).
message CACert {
  string cert_pem = 1;
  string private_key_pem = 2;
}

// CertBundle holds a leaf certificate and optionally its private key.
message CertBundle {
  string cert_pem = 1;
  // Present for push-mode certs; empty for CSR-mode (worker has the key).
  string key_pem = 2;
}
