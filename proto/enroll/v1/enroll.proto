syntax = "proto3";
package pigeon.enroll.v1;
option go_package = "github.com/pigeon-as/pigeon-enroll/proto/enroll/v1;enrollv1";

service Enroll {
  // Register performs node attestation and issues the identity certificate.
  rpc Register(stream RegisterRequest) returns (stream RegisterResponse);
  // Renew re-issues the identity certificate for an already-attested caller.
  rpc Renew(RenewRequest) returns (RenewResponse);
  // Read returns a scalar resource at path (idempotent, no side effects).
  // Paths: var/<n>, secret/<n>, ca/<n>, jwt_key/<n>, template/<n>.
  rpc Read(Request) returns (Response);
  // Write produces a fresh artifact at a mutating path.
  // Paths: pki/<role> (data["csr"] required, DER PKCS#10), jwt/<n>.
  rpc Write(Request) returns (Response);
}

message RegisterRequest {
  oneof step {
    RegisterParams params = 1;
    bytes challenge_response = 2;
  }
}

message RegisterParams {
  string identity = 1;
  string subject = 2;
  bytes csr_der = 3;
  TPMEvidence tpm = 10;
  HMACEvidence hmac = 11;
  BootstrapCertEvidence bootstrap_cert = 12;
}

message TPMEvidence {
  bytes ek_public = 1;
  bytes ek_cert = 2;
  bytes ak_public = 3;
  bytes ak_create_data = 4;
  bytes ak_create_attestation = 5;
  bytes ak_create_signature = 6;
}

message HMACEvidence {
  string token = 1;
  string scope = 2;
}

message BootstrapCertEvidence {}

message RegisterResponse {
  oneof step {
    TPMChallenge challenge = 1;
    RegisterResult result = 2;
  }
}

message TPMChallenge {
  bytes credential = 1;
  bytes secret = 2;
}

message RegisterResult {
  bytes cert_pem = 1;
  bytes key_pem = 2;
  bytes ca_bundle_pem = 3;
  uint32 renew_after_seconds = 4;
  uint32 expires_in_seconds = 5;
}

message RenewRequest {
  bytes csr_der = 1;
}

message RenewResponse {
  bytes cert_pem = 1;
  bytes key_pem = 2;
  bytes ca_bundle_pem = 3;
  uint32 renew_after_seconds = 4;
  uint32 expires_in_seconds = 5;
}

// Request is the shared shape for Read and Write.
// data is empty for Read; for Write it carries path-specific inputs
// (e.g. pki/<role>: data["csr"] = DER PKCS#10).
message Request {
  string path = 1;
  map<string, bytes> data = 2;
}

message Response {
  bytes content = 1;
  string content_type = 2;
  uint32 ttl_seconds = 3;
}